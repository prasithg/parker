name: Parker CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "hermes/**"

permissions:
  contents: read

jobs:
  backend-tests-and-grant-evals:
    name: Backend tests and grant evals
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Verify Python version
        run: python3.11 --version

      - name: Backend tests
        run: make test

      - name: Task-taxonomy eval
        run: make eval-tasks

      - name: Reference interactivity eval
        run: make eval-interactivity

      - name: Parker-generated demo interactivity eval
        run: make eval-demo-interactivity

      - name: Degraded-input replay eval
        run: make eval-degraded-input-replay

      - name: Claim-metric overclaim guard
        run: make eval-claim-metric-map
